<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cooking IA</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">

<h2>🍳 Cooking IA</h2>

<input id="input" placeholder="Ej: algo dulce y barato" style="width:300px; padding:8px;">
<button onclick="generar()">Generar receta</button>

<pre id="resultado" style="margin-top:20px; background:#eee; padding:10px;"></pre>

<script>
async function generar() {
  const input = document.getElementById("input").value;

  const prompt = `
Generá una receta para mate.
Preferencias: ${input}

Respondé SOLO en JSON:
{"titulo":"","descripcion":"","ingredientes":[],"pasos":[]}
`;

  try {
    const res = await fetch("http://localhost:3000/receta", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    const text = data.content.map(i => i.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();

    const receta = JSON.parse(clean);

    document.getElementById("resultado").textContent =
      "🍽 " + receta.titulo + "\n\n" +
      receta.descripcion + "\n\n" +
      "Ingredientes:\n- " + receta.ingredientes.join("\n- ") + "\n\n" +
      "Pasos:\n- " + receta.pasos.join("\n- ");

  } catch (e) {
    document.getElementById("resultado").textContent = "Error: " + e.message;
  }
}
</script>

</body>
</html>
