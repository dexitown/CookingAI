
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; }
.app { min-height: 100vh; background: #111; padding: 2rem; font-family: var(--font-sans); }
.header { text-align: center; margin-bottom: 2.5rem; }
.header .icon { font-size: 40px; display: block; margin-bottom: 0.5rem; }
.header h1 { font-size: 26px; font-weight: 500; color: #f0ede6; letter-spacing: -0.5px; }
.header p { font-size: 14px; color: #888; margin-top: 6px; }
.card { background: #1a1a1a; border: 0.5px solid #2e2e2e; border-radius: 14px; padding: 1.5rem; max-width: 560px; margin: 0 auto; }
.input-row { display: flex; gap: 10px; margin-bottom: 1rem; }
.input-row input {
  flex: 1; background: #242424; border: 0.5px solid #3a3a3a; border-radius: 8px;
  color: #f0ede6; font-size: 14px; padding: 10px 14px; outline: none;
  transition: border-color 0.2s;
}
.input-row input:focus { border-color: #c67c3c; }
.input-row input::placeholder { color: #555; }
.btn {
  background: #c67c3c; border: none; border-radius: 8px;
  color: #fff; font-size: 14px; font-weight: 500; padding: 10px 18px;
  cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s;
}
.btn:hover { background: #d98d4f; }
.btn:active { transform: scale(0.98); }
.btn:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }
.loading { display: none; align-items: center; gap: 8px; color: #888; font-size: 13px; margin-bottom: 1rem; }
.loading.visible { display: flex; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #c67c3c; animation: pulse 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
.result { display: none; }
.result.visible { display: block; }
.recipe-title { font-size: 18px; font-weight: 500; color: #f0ede6; margin-bottom: 6px; }
.recipe-desc { font-size: 13px; color: #888; margin-bottom: 1.25rem; line-height: 1.6; }
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #c67c3c; font-weight: 500; margin-bottom: 8px; }
.section { margin-bottom: 1.25rem; }
.ing-list { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }
.ing-list li { background: #242424; border: 0.5px solid #2e2e2e; border-radius: 20px; padding: 4px 12px; font-size: 13px; color: #c8c4bc; }
.steps-list { list-style: none; counter-reset: steps; }
.steps-list li { counter-increment: steps; display: flex; gap: 12px; margin-bottom: 10px; font-size: 13px; color: #aaa; line-height: 1.6; }
.steps-list li::before { content: counter(steps); min-width: 22px; height: 22px; background: #242424; border: 0.5px solid #3a3a3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #c67c3c; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
.error-msg { color: #e24b4a; font-size: 13px; margin-top: 0.5rem; }
</style>

<div class="app">
  <div class="header">
    <span class="icon">🍳</span>
    <h1>Cooking IA</h1>
    <p>Describí lo que tenés o lo que se te antoja</p>
  </div>
  <div class="card">
    <div class="input-row">
      <input id="input" placeholder="Ej: algo dulce y barato..." />
      <button class="btn" id="btn" onclick="generar()">Generar receta</button>
    </div>
    <div class="loading" id="loading">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span>Generando tu receta...</span>
    </div>
    <div class="result" id="result">
      <div class="recipe-title" id="titulo"></div>
      <div class="recipe-desc" id="desc"></div>
      <div class="section">
        <div class="section-label">Ingredientes</div>
        <ul class="ing-list" id="ings"></ul>
      </div>
      <div class="section">
        <div class="section-label">Preparación</div>
        <ol class="steps-list" id="steps"></ol>
      </div>
    </div>
    <div class="error-msg" id="error"></div>
  </div>
</div>

<script>
async function generar() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;
  const btn = document.getElementById("btn");
  const loading = document.getElementById("loading");
  const result = document.getElementById("result");
  const error = document.getElementById("error");
  btn.disabled = true;
  loading.classList.add("visible");
  result.classList.remove("visible");
  error.textContent = "";
  const prompt = `Generá una receta de cocina.\nPreferencias: ${input}\nRespondé SOLO en JSON sin ningún texto extra:\n{"titulo":"","descripcion":"","ingredientes":[],"pasos":[]}`;
  try {
    const res = await fetch("https://cooking-ia.onrender.com/receta", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const receta = JSON.parse(clean);
    document.getElementById("titulo").textContent = receta.titulo;
    document.getElementById("desc").textContent = receta.descripcion;
    const ings = document.getElementById("ings");
    ings.innerHTML = receta.ingredientes.map(i => `<li>${i}</li>`).join("");
    const steps = document.getElementById("steps");
    steps.innerHTML = receta.pasos.map(p => `<li>${p}</li>`).join("");
    result.classList.add("visible");
  } catch(e) {
    error.textContent = "Error: " + e.message;
  } finally {
    btn.disabled = false;
    loading.classList.remove("visible");
  }
}
document.getElementById("input").addEventListener("keydown", e => { if(e.key === "Enter") generar(); });
</script>
