<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookingAI — Tu chef inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-50: #E1F5EE;
      --green-100: #9FE1CB;
      --green-400: #1D9E75;
      --green-600: #0F6E56;
      --green-900: #04342C;
      --amber: #EF9F27;
      --bg: #0b0f0e;
      --surface: #131918;
      --surface2: #1c2421;
      --border: rgba(255,255,255,0.07);
      --text: #f0f5f3;
      --muted: #7a9490;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BG pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(29,158,117,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 10% 80%, rgba(239,159,39,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(11,15,14,0.85);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-400);
      box-shadow: 0 0 10px rgba(29,158,117,0.6);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .logo span { color: var(--green-400); }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(29,158,117,0.15);
      color: var(--green-100);
      border: 1px solid rgba(29,158,117,0.3);
      letter-spacing: 0.04em;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem 1.5rem;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--green-400);
    }

    .hero p {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── CHAT ── */
    #chat-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      padding: 1.25rem;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      min-height: 320px;
      max-height: 420px;
      margin-bottom: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.2s ease both;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }

    .avatar.bot {
      background: rgba(29,158,117,0.15);
      color: var(--green-400);
      border: 1px solid rgba(29,158,117,0.3);
    }

    .avatar.user {
      background: var(--green-400);
      color: #fff;
    }

    .bubble {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .msg.bot .bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--green-400);
      color: #fff;
      border-top-right-radius: 4px;
    }

    /* ── CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 400;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover {
      background: rgba(29,158,117,0.1);
      color: var(--green-100);
      border-color: rgba(29,158,117,0.4);
    }

    /* ── INPUT ── */
    .input-row {
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border 0.15s;
    }

    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: rgba(29,158,117,0.5); }

    #send-btn {
      padding: 12px 22px;
      border-radius: 12px;
      border: none;
      background: var(--green-400);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    #send-btn:hover { background: var(--green-600); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { background: var(--surface2); color: var(--muted); cursor: default; }

    /* ── TYPING ── */
    .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-400); animation: bounce 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 12px;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    footer strong { color: var(--green-400); font-weight: 500; }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      header { padding: 0 1rem; }
      main { padding: 1.25rem 1rem 1rem; }
      .hero { margin-bottom: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Cooking<span>AI</span>
  </div>
  <div class="badge">BETA 1.0</div>
</header>

<main>
  <div class="hero">
    <h1>Soy una ia<em>inteligente</em><br>de recetas deliciosas</h1>
    <p>Preguntame cualquier receta y te ayudo con ingredientes, pasos y tips nutricionales.</p>
  </div>

  <div id="chat-box"></div>

  <div class="chips" id="chips">
    <span class="chip" onclick="sendChip(this)">Desayuno saludable</span>
    <span class="chip" onclick="sendChip(this)">Cena vegetariana rápida</span>
    <span class="chip" onclick="sendChip(this)">Postre sin azúcar</span>
    <span class="chip" onclick="sendChip(this)">Alto en proteínas</span>
    <span class="chip" onclick="sendChip(this)">Tengo pollo y arroz ¿qué hago?</span>
  </div>

  <div class="input-row">
    <input id="user-input" type="text" placeholder="¿Qué querés cocinar hoy?" autocomplete="off" />
    <button id="send-btn" onclick="enviar()">Enviar</button>
  </div>
</main>

<footer>
  Hecho Por Massitech · <strong>CookingAI</strong> &copy; 2026
</footer>

<script>
  const chatBox = document.getElementById('chat-box');
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');

  const SYSTEM = `Sos CookingAI, un chef experto en cocina  y nutrición.
Respondés siempre en español rioplatense (como se habla en Argentina).
Cuando des una receta usá este formato:
- Nombre del plato con emoji relevante
- Tiempo de preparación y calorías aproximadas
- Ingredientes en lista breve
- Pasos numerados y concisos
- Un tip saludable al final

Si preguntan algo que no es de cocina o recetas, redirigí amablemente al tema culinario.
Sé cálido, motivador y conciso. Máximo 300 palabras por respuesta.`;

  const historial = [];

  function addMsg(text, role) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = `avatar ${role}`;
    av.textContent = role === 'user' ? 'Vos' : 'CA';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(av);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.id = 'typing-msg';
    const av = document.createElement('div');
    av.className = 'avatar bot';
    av.textContent = 'CA';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    msg.appendChild(av);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  async function enviar(texto) {
    const msg = texto || input.value.trim();
    if (!msg) return;
    input.value = '';
    btn.disabled = true;

    addMsg(msg, 'user');
    historial.push({ role: 'user', content: msg });
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM,
          messages: historial
        })
      });
      const data = await res.json();
      const reply = data.content.map(b => b.text || '').join('');
      removeTyping();
      addMsg(reply, 'bot');
      historial.push({ role: 'assistant', content: reply });
    } catch (e) {
      removeTyping();
      addMsg('Ups, algo falló. Revisá tu conexión e intentá de nuevo.', 'bot');
    }

    btn.disabled = false;
    input.focus();
  }

  function sendChip(el) { enviar(el.textContent); }

  input.addEventListener('keydown', e => { if (e.key === 'Enter') enviar(); });

  addMsg('¡Hola! Soy CookingAI,  Preguntame cualquier receta y te ayudo con ingredientes, pasos y tips nutricionales. ¿Qué querés cocinar hoy?', 'bot');
</script>

</body>
</html>
