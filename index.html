<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking AI | Para mi amor</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffafbd;
            --secondary: #ffc3a0;
            --bg: #fffafa;
            --text: #4a4a4a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { font-weight: 500; color: #ff6b81; margin-bottom: 10px; }
        p { font-weight: 300; font-size: 0.9rem; margin-bottom: 20px; }

        textarea {
            width: 100%;
            height: 100px;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 10px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(to right, #ff6b81, #ffafbd);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
        }

        #resultado {
            margin-top: 25px;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap; /* Para que respete los saltos de línea */
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-top: 1px dashed #ffafbd;
        }

        .loading { font-style: italic; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cooking AI ✨</h1>
        <p>¿Qué ingredientes tenemos hoy para cocinar algo rico?</p>
        
        <textarea id="ingredientes" placeholder="Ej: fideos, crema, queso y mucho amor..."></textarea>
        
        <button id="btnGenerar" onclick="generarReceta()">Crear Receta Mágica</button>

        <div id="resultado"></div>
    </div>

    <script>
       async function generarReceta() {
    const input = document.getElementById('ingredientes');
    const btn = document.getElementById('btnGenerar');
    const resDiv = document.getElementById('resultado');

    const API_KEY ="AIzaSyBtfywMzldMcxgJxL3P6ly2oPefZ2Wfdi4"; // ASEGURATE QUE NO TENGA ESPACIOS
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    try {
        btn.disabled = true;
        resDiv.innerText = "Consultando recetas...";

        const response = await fetch(URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Receta con: ${input.value}` }] }]
            })
        });

        const data = await response.json();

        // Si Google devuelve un error, lo mostramos directo
        if (data.error) {
            resDiv.innerHTML = `<b>Error de Google:</b> ${data.error.message}<br><i>Código: ${data.error.code}</i>`;
            console.log(data.error);
            return;
        }

        const receta = data.candidates[0].content.parts[0].text;
        resDiv.innerText = receta;

    } catch (err) {
        resDiv.innerText = "Error de conexión: " + err.message;
    } finally {
        btn.disabled = false;
    }
}
    </script>
</body>
</html>
